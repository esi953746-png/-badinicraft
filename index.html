<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnCraft - بادینی</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; direction: rtl; margin: 0; padding: 20px; }
        .balance { font-size: 45px; color: #f3ba2f; margin: 30px; font-weight: bold; }
        .tap-button { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #f3ba2f, #dca014); margin: 40px auto; cursor: pointer; box-shadow: 0 10px 25px rgba(243, 186, 47, 0.4); display: flex; align-items: center; justify-content: center; font-size: 60px; }
        .tap-button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h2 id="user-display">سلاڤ یاریزان! 🎮</h2>
    <div class="balance" id="coin-balance">0</div>
    <div class="tap-button" id="click-btn">⚒️</div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let score = 0;
        if (tg.initDataUnsafe?.user) { document.getElementById('user-display').innerText = `سلاڤ ${tg.initDataUnsafe.user.first_name}! 🎮`; }
        document.getElementById('click-btn').addEventListener('click', () => {
            score += 10;
            document.getElementById('coin-balance').innerText = score.toLocaleString();
        });
    </script>
</body>
</html>
